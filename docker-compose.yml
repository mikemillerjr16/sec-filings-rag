# Local development infrastructure only.
#   - `db`       : Postgres + pgvector  -> the Track 2 vector store, used locally for parity
#   - `langfuse` : self-hosted Langfuse -> traces/cost locally (hosted demo uses Langfuse Cloud)
#
# The app + Streamlit run on the host via `make api` / `make ui` (faster iteration than
# rebuilding an image each change). Requires Docker Desktop (not yet installed).

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse-db:
    image: postgres:16
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      - langfuse-db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-dev-secret-change-me
      SALT: local-dev-salt-change-me
      TELEMETRY_ENABLED: "false"

volumes:
  pgdata:
  langfuse-pgdata:
